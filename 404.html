<!doctype html>
<html lang="ar" dir="rtl">
  <head>

    <title>نبيل توفيق · انتقل الموقع — Nabil Tawfik · Site moved</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", Tahoma, sans-serif;
        background: #0b0908;
        color: #f0e7d6;

        color: #c8a86b;
      }
      p {
        max-width: 32rem;
        line-height: 1.7;
      }
    </style>
    <script>
      // Preserve the path + query + hash on bounce so deep links still
      // land on the right route under the new origin.
      (function () {
        try {
          var dest =
            "https://nabil-tawfik-site.pages.dev" +
            (location.pathname || "/") +
            (location.search || "") +
            (location.hash || "");
          location.replace(dest);
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <p>
      انتقل الموقع إلى
